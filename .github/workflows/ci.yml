name: deterministic-quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONHASHSEED: "0"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install locked uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"
          python-version: "3.12.9"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Sync locked development environment
        run: uv sync --locked --extra dev

      - name: Check repository links and secrets
        run: uv run python scripts/check_repository.py

      - name: Type check
        run: uv run mypy

      - name: Lint and format check
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run deterministic tests
        run: uv run pytest

      - name: Verify lock and whitespace
        run: |
          uv lock --check
          git diff --check
