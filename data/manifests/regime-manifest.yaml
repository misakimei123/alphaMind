classification:
  point_in_time_only: true
  pair_local: true
  uses_future_candles: false
  annualization_periods_4h: 2190
  minimum_history_candles: 582
  insufficient_history_label: unclassified
  conflict_precedence:
    - rapid_crash
    - liquidity_stress
    - bear_trend
    - bull_trend
    - sideways_whipsaw
    - unclassified
  metrics:
    return_7d: close_t / close_t_minus_42_candles - 1
    return_60d: close_t / close_t_minus_360_candles - 1
    realized_volatility_30d: stddev(log_return_4h_last_180) * sqrt(2190)
    volume_ratio_7d_to_prior_90d: median(volume_last_42) / median(volume_previous_540)
    sign_changes_5d_over_60d: count_sign_changes(non_overlapping_5d_returns_last_60d)
  rules:
    - regime: rapid_crash
      when: return_7d <= -0.15
    - regime: liquidity_stress
      when: volume_ratio_7d_to_prior_90d <= 0.40
      limitation: OHLCV_volume_proxy_only
    - regime: bear_trend
      when: return_60d <= -0.20
    - regime: bull_trend
      when: return_60d >= 0.20
    - regime: sideways_whipsaw
      when: abs(return_60d) < 0.10 and realized_volatility_30d >= 0.60 and sign_changes_5d_over_60d >= 6
    - regime: unclassified
      when: no_prior_rule_matches

