$schema: https://json-schema.org/draft/2020-12/schema
$id: https://alphamind.local/schemas/operational-control.schema.yaml
title: alphaMind OperationalControlSnapshot v1
type: object
additionalProperties: false
required:
  - schema_version
  - revision
  - ai_paused
  - entry_stopped
  - emergency
  - manual_review_required
  - cancel_pending_entries
  - safe_exit_allowed
  - reason_codes
  - updated_at_utc
properties:
  schema_version:
    const: 1
  revision:
    type: integer
    minimum: 0
  ai_paused:
    type: boolean
  entry_stopped:
    type: boolean
  emergency:
    type: boolean
  manual_review_required:
    type: boolean
  cancel_pending_entries:
    type: boolean
  safe_exit_allowed:
    const: true
  reason_codes:
    type: array
    minItems: 1
    maxItems: 3
    uniqueItems: true
    items:
      enum: [NORMAL_OPERATION, AI_PAUSED, ENTRY_STOPPED, EMERGENCY_MODE]
  updated_at_utc:
    oneOf:
      - type: 'null'
      - type: string
        format: date-time
allOf:
  - if:
      properties:
        revision:
          const: 0
    then:
      properties:
        updated_at_utc:
          type: 'null'
  - if:
      properties:
        emergency:
          const: true
    then:
      properties:
        ai_paused:
          const: true
        entry_stopped:
          const: true
        manual_review_required:
          const: true
        cancel_pending_entries:
          const: true
$comment: >-
  Runtime code derives reason_codes deterministically and rejects recovery from emergency
  through the Telegram command surface.
