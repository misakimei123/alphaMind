$schema: https://json-schema.org/draft/2020-12/schema
$id: https://alphamind.local/schemas/artifact-manifest.schema.yaml
title: alphaMind Experiment Artifact Manifest v1
description: 给定 experiment ID 后用于定位并逐字节验证全部输入与输出的 manifest。
type: object
additionalProperties: false
required:
  - schema_version
  - experiment_id
  - generated_at_utc
  - status
  - registration_sha256
  - files
  - manifest_content_sha256
properties:
  schema_version: {const: 1}
  experiment_id:
    type: string
    pattern: "^exp-[0-9]{8}T[0-9]{6}Z-[a-f0-9]{12}$"
  generated_at_utc:
    type: string
    format: date-time
    pattern: "Z$"
  status:
    enum: [PRE_REGISTERED, RUNNING, COMPLETED, REJECTED, INVALIDATED]
  registration_sha256:
    $ref: "#/$defs/sha256"
  files:
    type: array
    minItems: 1
    maxItems: 128
    uniqueItems: true
    items:
      $ref: "#/$defs/file"
  manifest_content_sha256:
    $ref: "#/$defs/sha256"
    $comment: 对除本字段外的完整 manifest 执行受限 JCS canonical JSON 后计算。
$defs:
  sha256:
    type: string
    pattern: "^[a-f0-9]{64}$"
  file:
    type: object
    additionalProperties: false
    required: [direction, role, slice, path, sha256, required, record_count]
    properties:
      direction: {enum: [INPUT, OUTPUT]}
      role:
        enum:
          - hypothesis
          - strategy_card
          - strategy_config
          - runtime_lock
          - dataset_manifest
          - cost_model
          - registration
          - completion
          - trades
          - metrics
          - report
          - review
          - logs
      slice: {enum: [train, validation, holdout, stress, all, none]}
      path:
        type: string
        pattern: "^(?:research|data|configs|artifacts)/[A-Za-z0-9._/-]+$"
      sha256:
        $ref: "#/$defs/sha256"
      required:
        type: boolean
      record_count:
        type: [integer, "null"]
        minimum: 0
