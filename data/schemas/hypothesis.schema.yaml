$schema: https://json-schema.org/draft/2020-12/schema
$id: https://alphamind.local/schemas/hypothesis.schema.yaml
title: alphaMind Research Hypothesis v1
description: 在读取实验结果前冻结的研究假设；结果与评审不得写回本记录。
type: object
additionalProperties: false
required:
  - schema_version
  - hypothesis_id
  - created_at_utc
  - status
  - statement
  - economic_rationale
  - objective
  - primary_metric
  - pass_condition
  - falsification_conditions
  - strategy_card
  - result_known_at_registration
properties:
  schema_version:
    const: 1
  hypothesis_id:
    type: string
    pattern: "^hyp-[a-z0-9][a-z0-9-]{2,63}-v[0-9]+$"
  created_at_utc:
    type: string
    format: date-time
    pattern: "Z$"
  status:
    enum: [FROZEN, RETIRED]
  statement:
    type: string
    minLength: 20
    maxLength: 2000
  economic_rationale:
    type: string
    minLength: 20
    maxLength: 4000
  objective:
    type: string
    pattern: "^[a-z][a-z0-9_]{2,127}$"
  primary_metric:
    type: string
    pattern: "^[a-z][a-z0-9_]{2,63}$"
  pass_condition:
    type: string
    minLength: 5
    maxLength: 2000
  falsification_conditions:
    type: array
    minItems: 1
    maxItems: 32
    uniqueItems: true
    items:
      type: string
      pattern: "^[a-z][a-z0-9_]{2,127}$"
  strategy_card:
    type: object
    additionalProperties: false
    required: [path, sha256]
    properties:
      path:
        type: string
        pattern: "^research/strategy_cards/[A-Za-z0-9._/-]+\\.ya?ml$"
      sha256:
        type: string
        pattern: "^[a-f0-9]{64}$"
  result_known_at_registration:
    const: false
