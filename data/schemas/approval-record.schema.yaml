$schema: https://json-schema.org/draft/2020-12/schema
$id: https://alphamind.local/schemas/approval-record.schema.yaml
title: alphaMind ApprovalRecord v1
description: Current proposal state plus its immutable event history.
type: object
additionalProperties: false
required:
  - schema_version
  - proposal_id
  - cycle_id
  - action
  - action_sha256
  - state
  - created_at_utc
  - updated_at_utc
  - expires_at_utc
  - nonce_sha256
  - idempotency_key
  - authorization
  - events
  - execution
properties:
  schema_version:
    const: 1
  proposal_id:
    type: string
    pattern: "^proposal-[0-9]{8}T[0-9]{6}Z-[a-f0-9]{12}$"
  cycle_id:
    type: string
    pattern: "^cycle-[0-9]{8}T[0-9]{6}Z-[a-f0-9]{8}$"
  action:
    $ref: trade-action.schema.yaml
  action_sha256:
    $ref: "#/$defs/sha256"
  state:
    $ref: "#/$defs/state"
  created_at_utc:
    $ref: "#/$defs/utc_timestamp"
  updated_at_utc:
    $ref: "#/$defs/utc_timestamp"
  expires_at_utc:
    $ref: "#/$defs/utc_timestamp"
  nonce_sha256:
    $ref: "#/$defs/sha256"
  idempotency_key:
    type: string
    pattern: "^[A-Za-z0-9][A-Za-z0-9_.:-]{7,127}$"
  authorization:
    type: object
    additionalProperties: false
    required: [allowed_user_id_sha256, allowed_chat_id_sha256, decided_by]
    properties:
      allowed_user_id_sha256:
        type: array
        minItems: 1
        maxItems: 20
        uniqueItems: true
        items:
          $ref: "#/$defs/sha256"
      allowed_chat_id_sha256:
        type: array
        minItems: 1
        maxItems: 20
        uniqueItems: true
        items:
          $ref: "#/$defs/sha256"
      decided_by:
        type: [object, "null"]
        additionalProperties: false
        required: [user_id_sha256, chat_id_sha256, decided_at_utc]
        properties:
          user_id_sha256:
            $ref: "#/$defs/sha256"
          chat_id_sha256:
            $ref: "#/$defs/sha256"
          decided_at_utc:
            $ref: "#/$defs/utc_timestamp"
  events:
    type: array
    minItems: 1
    maxItems: 50
    items:
      $ref: approval-event.schema.yaml
  execution:
    type: [object, "null"]
    additionalProperties: false
    required: [execution_id, submitted_at_utc, finished_at_utc, order_ids, reason_codes]
    properties:
      execution_id:
        type: string
        pattern: "^exec-[0-9]{8}T[0-9]{6}Z-[a-f0-9]{12}$"
      submitted_at_utc:
        $ref: "#/$defs/utc_timestamp"
      finished_at_utc:
        anyOf:
          - $ref: "#/$defs/utc_timestamp"
          - type: "null"
      order_ids:
        type: array
        maxItems: 20
        uniqueItems: true
        items:
          type: string
          minLength: 1
          maxLength: 128
      reason_codes:
        type: array
        minItems: 1
        maxItems: 16
        uniqueItems: true
        items:
          type: string
          pattern: "^[A-Z][A-Z0-9_]{1,63}$"
$defs:
  utc_timestamp:
    type: string
    format: date-time
    pattern: "Z$"
  sha256:
    type: string
    pattern: "^[a-f0-9]{64}$"
  state:
    enum:
      - DRAFT
      - VALIDATED
      - PENDING_APPROVAL
      - APPROVED
      - REJECTED
      - EXPIRED
      - REVALIDATING
      - QUEUED
      - EXECUTED
      - PARTIALLY_FILLED
      - CANCELLED
      - FAILED
$comment: >-
  Runtime code must verify event ordering, proposal/action consistency, current state equals the last
  event, one user decision only, TTL, whitelist membership, nonce use and execution idempotency.
