$schema: https://json-schema.org/draft/2020-12/schema
$id: https://alphamind.local/schemas/instrument-registry.schema.yaml
title: alphaMind InstrumentRegistry v1
description: >-
  Configurable Bybit instrument universe. Symbols and leverage limits are data, not code constants.
type: object
additionalProperties: false
required:
  - schema_version
  - exchange
  - quote_currency
  - instruments
properties:
  schema_version:
    const: 1
  exchange:
    const: bybit
  quote_currency:
    const: USDT
  instruments:
    type: array
    minItems: 1
    maxItems: 50
    uniqueItems: true
    items:
      $ref: "#/$defs/instrument"
$defs:
  positive_decimal:
    type: string
    pattern: "^(?:0\\.0*[1-9][0-9]*|[1-9][0-9]*(?:\\.[0-9]+)?)$"
  instrument_id:
    type: string
    pattern: "^[A-Z][A-Z0-9]{1,15}$"
  instrument:
    type: object
    additionalProperties: false
    required:
      - id
      - enabled
      - spot
      - futures
    properties:
      id:
        $ref: "#/$defs/instrument_id"
      enabled:
        type: boolean
      spot:
        type: object
        additionalProperties: false
        required: [enabled, pair]
        properties:
          enabled:
            type: boolean
          pair:
            type: [string, "null"]
            pattern: "^[A-Z][A-Z0-9]{1,15}/USDT$"
        allOf:
          - if:
              properties:
                enabled: {const: true}
              required: [enabled]
            then:
              properties:
                pair: {type: string}
            else:
              properties:
                pair: {type: "null"}
      futures:
        type: object
        additionalProperties: false
        required:
          - enabled
          - pair
          - allow_long
          - allow_short
          - max_leverage
        properties:
          enabled:
            type: boolean
          pair:
            type: [string, "null"]
            pattern: "^[A-Z][A-Z0-9]{1,15}/USDT:USDT$"
          allow_long:
            type: boolean
          allow_short:
            type: boolean
          max_leverage:
            anyOf:
              - $ref: "#/$defs/positive_decimal"
              - type: "null"
        allOf:
          - if:
              properties:
                enabled: {const: true}
              required: [enabled]
            then:
              properties:
                pair: {type: string}
                max_leverage:
                  $ref: "#/$defs/positive_decimal"
              anyOf:
                - properties:
                    allow_long: {const: true}
                - properties:
                    allow_short: {const: true}
            else:
              properties:
                pair: {type: "null"}
                allow_long: {const: false}
                allow_short: {const: false}
                max_leverage: {type: "null"}
x-business-rules:
  - instrument ids must be unique
  - enabled market pairs must be unique and their base asset must match instrument id
  - at least one market must be enabled for every enabled instrument
  - effective leverage is min(global config, instrument config, exchange capability)
  - unavailable markets disable only that instrument market, not the whole registry
