$schema: https://json-schema.org/draft/2020-12/schema
$id: https://alphamind.local/schemas/ai-profile.schema.yaml
title: alphaMind AIProfile v1
description: Versioned model, prompt, retry, budget and fail-closed policy for AI decisions.
type: object
additionalProperties: false
required:
  - schema_version
  - profile_id
  - provider
  - model
  - prompt
  - structured_output
  - request
  - retry
  - cost
  - failure_policy
  - audit
properties:
  schema_version:
    const: 1
  profile_id:
    type: string
    pattern: "^[a-z][a-z0-9_-]{2,63}$"
  provider:
    oneOf:
      - type: object
        additionalProperties: false
        required: [id, api, base_url, api_key_env]
        properties:
          id: {const: openai}
          api: {const: responses}
          base_url: {const: https://api.openai.com/v1}
          api_key_env: {const: OPENAI_API_KEY}
      - type: object
        additionalProperties: false
        required: [id, api, base_url, api_key_env]
        properties:
          id: {const: deepseek}
          api: {const: chat_completions}
          base_url: {const: https://api.deepseek.com}
          api_key_env: {const: DEEPSEEK_API_KEY}
  model:
    oneOf:
      - type: object
        additionalProperties: false
        required: [id, thinking, reasoning_effort, verbosity, temperature, seed]
        properties:
          id: {const: gpt-5.6-terra}
          thinking: {type: "null"}
          reasoning_effort: {const: medium}
          verbosity: {const: low}
          temperature: {type: "null"}
          seed: {type: "null"}
      - type: object
        additionalProperties: false
        required: [id, thinking, reasoning_effort, verbosity, temperature, seed]
        properties:
          id: {const: deepseek-v4-flash}
          thinking: {const: disabled}
          reasoning_effort: {type: "null"}
          verbosity: {type: "null"}
          temperature: {const: 0}
          seed: {type: "null"}
  prompt:
    type: object
    additionalProperties: false
    required: [id, version, path, sha256]
    properties:
      id:
        const: alphamind_trade_decision
      version:
        const: 1
      path:
        const: prompts/ai/trade-decision-v1.md
      sha256:
        $ref: "#/$defs/sha256"
  structured_output:
    type: object
    additionalProperties: false
    required:
      - enabled
      - strict
      - provider_schema_enforced
      - schema_name
      - schema_path
      - runtime_action_schema_path
    properties:
      enabled:
        const: true
      strict:
        const: true
      provider_schema_enforced:
        type: boolean
      schema_name:
        const: alphamind_model_decision_v1
      schema_path:
        const: data/schemas/model-decision.schema.yaml
      runtime_action_schema_path:
        const: data/schemas/trade-action.schema.yaml
  request:
    type: object
    additionalProperties: false
    required:
      - timeout_seconds
      - max_input_tokens
      - max_output_tokens
      - store_response
      - tools_enabled
      - background
    properties:
      timeout_seconds:
        type: integer
        minimum: 10
        maximum: 110
      max_input_tokens:
        type: integer
        minimum: 1000
        maximum: 100000
      max_output_tokens:
        type: integer
        minimum: 500
        maximum: 10000
      store_response:
        const: false
      tools_enabled:
        const: false
      background:
        const: false
  retry:
    type: object
    additionalProperties: false
    required: [maximum_attempts, backoff_seconds, retry_on, never_retry_on]
    properties:
      maximum_attempts:
        type: integer
        minimum: 1
        maximum: 2
      backoff_seconds:
        type: array
        maxItems: 1
        items:
          type: integer
          minimum: 1
          maximum: 10
      retry_on:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          enum: [timeout, rate_limit, server_error, malformed_structured_output]
      never_retry_on:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          enum: [authentication_error, policy_refusal, business_validation_error, budget_exceeded]
  cost:
    type: object
    additionalProperties: false
    required:
      - currency
      - pricing_checked_at_utc
      - input_per_million_tokens
      - cached_input_per_million_tokens
      - output_per_million_tokens
      - maximum_cost_per_cycle
      - maximum_cost_per_utc_day
      - pricing_source
    properties:
      currency:
        const: USD
      pricing_checked_at_utc:
        $ref: "#/$defs/utc_timestamp"
      input_per_million_tokens:
        $ref: "#/$defs/positive_decimal"
      cached_input_per_million_tokens:
        $ref: "#/$defs/positive_decimal"
      output_per_million_tokens:
        $ref: "#/$defs/positive_decimal"
      maximum_cost_per_cycle:
        $ref: "#/$defs/positive_decimal"
      maximum_cost_per_utc_day:
        $ref: "#/$defs/positive_decimal"
      pricing_source:
        type: string
        format: uri
  failure_policy:
    type: object
    additionalProperties: false
    required: [timeout, provider_error, invalid_output, budget_exceeded]
    properties:
      timeout:
        const: HOLD_ONLY
      provider_error:
        const: HOLD_ONLY
      invalid_output:
        const: HOLD_ONLY
      budget_exceeded:
        const: HOLD_ONLY
  audit:
    type: object
    additionalProperties: false
    required:
      - record_model_id
      - record_prompt_sha256
      - record_config_sha256
      - record_input_sha256
      - record_usage
      - record_raw_prompt
      - record_api_key
    properties:
      record_model_id: {const: true}
      record_prompt_sha256: {const: true}
      record_config_sha256: {const: true}
      record_input_sha256: {const: true}
      record_usage: {const: true}
      record_raw_prompt: {const: false}
      record_api_key: {const: false}
allOf:
  - oneOf:
      - properties:
          provider:
            properties:
              id: {const: openai}
          model:
            properties:
              id: {const: gpt-5.6-terra}
          structured_output:
            properties:
              provider_schema_enforced: {const: true}
          cost:
            properties:
              input_per_million_tokens: {const: "2.50"}
              cached_input_per_million_tokens: {const: "0.25"}
              output_per_million_tokens: {const: "15.00"}
              pricing_source:
                const: https://developers.openai.com/api/docs/models/gpt-5.6-terra
      - properties:
          provider:
            properties:
              id: {const: deepseek}
          model:
            properties:
              id: {const: deepseek-v4-flash}
          structured_output:
            properties:
              provider_schema_enforced: {const: false}
          cost:
            properties:
              input_per_million_tokens: {const: "0.14"}
              cached_input_per_million_tokens: {const: "0.0028"}
              output_per_million_tokens: {const: "0.28"}
              pricing_source:
                const: https://api-docs.deepseek.com/quick_start/pricing
$defs:
  utc_timestamp:
    type: string
    format: date-time
    pattern: "Z$"
  sha256:
    type: string
    pattern: "^[a-f0-9]{64}$"
  positive_decimal:
    type: string
    pattern: "^(?:0\\.0*[1-9][0-9]*|[1-9][0-9]*(?:\\.[0-9]+)?)$"
$comment: >-
  Cost limits are application-side circuit breakers, not provider billing guarantees. R2 must count
  actual usage, stop calls at the daily limit and fail closed to HOLD_ONLY.
