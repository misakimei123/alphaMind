$schema: https://json-schema.org/draft/2020-12/schema
$id: https://alphamind.local/schemas/market-capability-snapshot.schema.yaml
title: alphaMind MarketCapabilitySnapshot v1
description: >-
  Read-only Bybit mainnet spot and linear market rules for the configured Instrument Registry.
  Decimal values remain strings and unavailable markets never contain executable constraints.
type: object
additionalProperties: false
required:
  - schema_version
  - snapshot_id
  - fetched_at_utc
  - exchange
  - environment
  - base_url
  - endpoint
  - instrument_registry_sha256
  - global_max_leverage
  - source
  - summary
  - instruments
properties:
  schema_version:
    const: 1
  snapshot_id:
    type: string
    pattern: "^capability-[0-9]{8}T[0-9]{6}Z-[a-f0-9]{12}$"
  fetched_at_utc:
    type: string
    format: date-time
    pattern: "Z$"
  exchange:
    const: bybit
  environment:
    const: mainnet
  base_url:
    const: https://api.bybit.com
  endpoint:
    const: /v5/market/instruments-info
  instrument_registry_sha256:
    $ref: "#/$defs/sha256"
  global_max_leverage:
    $ref: "#/$defs/positive_decimal"
  source:
    type: object
    additionalProperties: false
    required: [response_sha256, page_sha256, server_time_milliseconds]
    properties:
      response_sha256:
        $ref: "#/$defs/sha256"
      page_sha256:
        type: object
        additionalProperties: false
        required: [spot, linear]
        properties:
          spot:
            $ref: "#/$defs/hash_list"
          linear:
            $ref: "#/$defs/hash_list"
      server_time_milliseconds:
        type: array
        minItems: 2
        maxItems: 20
        items:
          type: integer
          minimum: 1
  summary:
    type: object
    additionalProperties: false
    required:
      - instrument_count
      - available_spot_count
      - available_futures_count
      - unavailable_enabled_markets
    properties:
      instrument_count:
        type: integer
        minimum: 1
        maximum: 50
      available_spot_count:
        type: integer
        minimum: 0
        maximum: 50
      available_futures_count:
        type: integer
        minimum: 0
        maximum: 50
      unavailable_enabled_markets:
        type: array
        uniqueItems: true
        maxItems: 100
        items:
          type: string
          pattern: "^[A-Z][A-Z0-9]{1,15}:(?:spot|futures)$"
  instruments:
    type: array
    minItems: 1
    maxItems: 50
    uniqueItems: true
    items:
      $ref: "#/$defs/instrument"
$defs:
  sha256:
    type: string
    pattern: "^[a-f0-9]{64}$"
  positive_decimal:
    type: string
    pattern: '^(?:0\.0*[1-9][0-9]*|[1-9][0-9]*(?:\.[0-9]+)?)$'
  nullable_positive_decimal:
    anyOf:
      - $ref: "#/$defs/positive_decimal"
      - type: "null"
  hash_list:
    type: array
    minItems: 1
    maxItems: 10
    items:
      $ref: "#/$defs/sha256"
  instrument:
    type: object
    additionalProperties: false
    required: [instrument_id, enabled, spot, futures]
    properties:
      instrument_id:
        type: string
        pattern: "^[A-Z][A-Z0-9]{1,15}$"
      enabled:
        type: boolean
      spot:
        allOf:
          - $ref: "#/$defs/market"
          - properties:
              market: {const: spot}
      futures:
        allOf:
          - $ref: "#/$defs/market"
          - properties:
              market: {const: futures}
  market:
    type: object
    additionalProperties: false
    required:
      - market
      - pair
      - enabled_by_registry
      - available
      - unavailable_reason
      - exchange_symbol
      - status
      - contract_type
      - price_tick
      - quantity_step
      - minimum_quantity
      - minimum_notional
      - maximum_limit_quantity
      - maximum_market_quantity
      - funding_interval_minutes
      - configured_max_leverage
      - exchange_max_leverage
      - effective_max_leverage
    properties:
      market:
        enum: [spot, futures]
      pair:
        type: [string, "null"]
        pattern: "^[A-Z][A-Z0-9]{1,15}/USDT(?::USDT)?$"
      enabled_by_registry:
        type: boolean
      available:
        type: boolean
      unavailable_reason:
        type: [string, "null"]
        enum:
          - null
          - REGISTRY_DISABLED
          - NOT_RETURNED_AS_TRADING
          - STATUS_NOT_TRADING
          - INVALID_MARKET_RECORD
          - WRONG_CONTRACT_TYPE
      exchange_symbol:
        type: [string, "null"]
        pattern: "^[A-Z][A-Z0-9]{2,31}$"
      status:
        type: [string, "null"]
        maxLength: 32
      contract_type:
        type: [string, "null"]
        maxLength: 64
      price_tick:
        $ref: "#/$defs/nullable_positive_decimal"
      quantity_step:
        $ref: "#/$defs/nullable_positive_decimal"
      minimum_quantity:
        $ref: "#/$defs/nullable_positive_decimal"
      minimum_notional:
        $ref: "#/$defs/nullable_positive_decimal"
      maximum_limit_quantity:
        $ref: "#/$defs/nullable_positive_decimal"
      maximum_market_quantity:
        $ref: "#/$defs/nullable_positive_decimal"
      funding_interval_minutes:
        type: [integer, "null"]
        minimum: 1
      configured_max_leverage:
        $ref: "#/$defs/nullable_positive_decimal"
      exchange_max_leverage:
        $ref: "#/$defs/nullable_positive_decimal"
      effective_max_leverage:
        $ref: "#/$defs/nullable_positive_decimal"
    allOf:
      - if:
          properties:
            available: {const: true}
          required: [available]
        then:
          properties:
            enabled_by_registry: {const: true}
            unavailable_reason: {type: "null"}
            exchange_symbol: {type: string}
            status: {const: Trading}
            price_tick: {$ref: "#/$defs/positive_decimal"}
            quantity_step: {$ref: "#/$defs/positive_decimal"}
            minimum_quantity: {$ref: "#/$defs/positive_decimal"}
            minimum_notional: {$ref: "#/$defs/positive_decimal"}
            maximum_limit_quantity: {$ref: "#/$defs/positive_decimal"}
            maximum_market_quantity: {$ref: "#/$defs/positive_decimal"}
        else:
          properties:
            unavailable_reason: {type: string}
            price_tick: {type: "null"}
            quantity_step: {type: "null"}
            minimum_quantity: {type: "null"}
            minimum_notional: {type: "null"}
            maximum_limit_quantity: {type: "null"}
            maximum_market_quantity: {type: "null"}

x-business-rules:
  - snapshot_id suffix must equal the canonical content hash
  - instrument ids and order must match the referenced Instrument Registry
  - effective futures leverage is min(global, configured instrument, exchange maximum)
  - malformed or unavailable single markets disable only that market
  - request-level, pagination, or source-integrity failures publish no snapshot
