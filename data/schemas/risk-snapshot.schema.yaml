$schema: https://json-schema.org/draft/2020-12/schema
$id: https://alphamind.local/schemas/risk-snapshot.schema.yaml
title: alphaMind RiskSnapshot v2
description: >-
  spot/futures 共用的只读账户级风险快照。所有金额、价格、数量和比例均使用
  十进制字符串；运行时还会复核 NAV、PnL、敞口、挂单、强平缓冲和内容 hash。
type: object
additionalProperties: false
required:
  - schema_version
  - snapshot_id
  - producer_version
  - generated_at_utc
  - expires_at_utc
  - account_id
  - accounting_currency
  - risk_config_sha256
  - instrument_registry_sha256
  - market_capability_snapshot_sha256
  - source_freshness
  - accounting
  - open_orders
  - exposure
  - thresholds
  - decision
properties:
  schema_version: {const: 2}
  snapshot_id:
    type: string
    pattern: '^risk-[0-9]{8}T[0-9]{6}Z-[a-f0-9]{12}$'
  producer_version:
    type: string
    pattern: '^[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$'
  generated_at_utc: {$ref: '#/$defs/utc_timestamp'}
  expires_at_utc: {$ref: '#/$defs/utc_timestamp'}
  account_id: {type: string, minLength: 1, maxLength: 128}
  accounting_currency: {const: USDT}
  risk_config_sha256: {$ref: '#/$defs/sha256'}
  instrument_registry_sha256: {$ref: '#/$defs/sha256'}
  market_capability_snapshot_sha256: {$ref: '#/$defs/sha256'}
  source_freshness:
    type: object
    additionalProperties: false
    required:
      - account_observed_at_utc
      - market_observed_at_utc
      - orders_observed_at_utc
      - maximum_source_age_seconds
      - maximum_future_clock_skew_seconds
      - account_complete
      - market_complete
      - orders_complete
    properties:
      account_observed_at_utc: {$ref: '#/$defs/utc_timestamp'}
      market_observed_at_utc: {$ref: '#/$defs/utc_timestamp'}
      orders_observed_at_utc: {$ref: '#/$defs/utc_timestamp'}
      maximum_source_age_seconds: {const: 30}
      maximum_future_clock_skew_seconds: {const: 5}
      account_complete: {type: boolean}
      market_complete: {type: boolean}
      orders_complete: {type: boolean}
  accounting:
    type: object
    additionalProperties: false
    required:
      - quote_cash
      - positions
      - accrued_fees
      - known_liabilities
      - futures_unrealized_pnl_quote
      - accrued_funding_quote
      - nav
      - approved_capital_baseline
      - cumulative_net_external_cash_flow
      - cashflow_adjusted_cumulative_pnl
      - daily_opening_nav
      - daily_net_external_cash_flow
      - daily_pnl
      - weekly_opening_nav
      - weekly_net_external_cash_flow
      - weekly_pnl
      - cashflow_adjusted_high_water_mark
      - drawdown_fraction
      - unexplained_balance_difference
    properties:
      quote_cash: {$ref: '#/$defs/nonnegative_decimal'}
      positions:
        type: array
        maxItems: 100
        items:
          oneOf:
            - {$ref: '#/$defs/spot_position'}
            - {$ref: '#/$defs/futures_position'}
      accrued_fees: {$ref: '#/$defs/nonnegative_decimal'}
      known_liabilities: {$ref: '#/$defs/nonnegative_decimal'}
      futures_unrealized_pnl_quote: {$ref: '#/$defs/signed_decimal'}
      accrued_funding_quote: {$ref: '#/$defs/signed_decimal'}
      nav: {$ref: '#/$defs/positive_decimal'}
      approved_capital_baseline: {$ref: '#/$defs/positive_decimal'}
      cumulative_net_external_cash_flow: {$ref: '#/$defs/signed_decimal'}
      cashflow_adjusted_cumulative_pnl: {$ref: '#/$defs/signed_decimal'}
      daily_opening_nav: {$ref: '#/$defs/positive_decimal'}
      daily_net_external_cash_flow: {$ref: '#/$defs/signed_decimal'}
      daily_pnl: {$ref: '#/$defs/signed_decimal'}
      weekly_opening_nav: {$ref: '#/$defs/positive_decimal'}
      weekly_net_external_cash_flow: {$ref: '#/$defs/signed_decimal'}
      weekly_pnl: {$ref: '#/$defs/signed_decimal'}
      cashflow_adjusted_high_water_mark: {$ref: '#/$defs/positive_decimal'}
      drawdown_fraction: {$ref: '#/$defs/fraction'}
      unexplained_balance_difference: {$ref: '#/$defs/signed_decimal'}
  open_orders:
    type: array
    maxItems: 200
    items: {$ref: '#/$defs/open_order'}
  exposure:
    type: object
    additionalProperties: false
    required:
      - open_exposure_quote
      - spot_open_exposure_quote
      - futures_long_notional_quote
      - futures_short_notional_quote
      - pending_entry_exposure_quote
      - pending_spot_entry_exposure_quote
      - pending_futures_long_entry_exposure_quote
      - pending_futures_short_entry_exposure_quote
      - available_balance_quote
      - available_margin_quote
      - used_margin_quote
    properties:
      open_exposure_quote: {$ref: '#/$defs/nonnegative_decimal'}
      spot_open_exposure_quote: {$ref: '#/$defs/nonnegative_decimal'}
      futures_long_notional_quote: {$ref: '#/$defs/nonnegative_decimal'}
      futures_short_notional_quote: {$ref: '#/$defs/nonnegative_decimal'}
      pending_entry_exposure_quote: {$ref: '#/$defs/nonnegative_decimal'}
      pending_spot_entry_exposure_quote: {$ref: '#/$defs/nonnegative_decimal'}
      pending_futures_long_entry_exposure_quote: {$ref: '#/$defs/nonnegative_decimal'}
      pending_futures_short_entry_exposure_quote: {$ref: '#/$defs/nonnegative_decimal'}
      available_balance_quote: {$ref: '#/$defs/nonnegative_decimal'}
      available_margin_quote: {$ref: '#/$defs/nonnegative_decimal'}
      used_margin_quote: {$ref: '#/$defs/nonnegative_decimal'}
  thresholds:
    type: object
    additionalProperties: false
    required:
      - trade_risk_fraction
      - daily_loss_fraction
      - weekly_loss_fraction
      - drawdown_fraction
      - maximum_absolute_loss_fraction
      - maximum_absolute_loss
      - effective_absolute_loss_limit
    properties:
      trade_risk_fraction: {const: '0.0025'}
      daily_loss_fraction: {const: '0.01'}
      weekly_loss_fraction: {const: '0.03'}
      drawdown_fraction: {const: '0.05'}
      maximum_absolute_loss_fraction: {const: '0.10'}
      maximum_absolute_loss: {const: '45'}
      effective_absolute_loss_limit: {$ref: '#/$defs/positive_decimal'}
  decision:
    type: object
    additionalProperties: false
    required:
      - state
      - entry_allowed
      - close_only
      - kill_switch
      - cancel_pending_entries
      - safe_exit_allowed
      - manual_review_required
      - reason_codes
    properties:
      state:
        enum: [ENTRY_ALLOWED, CLOSE_ONLY, KILLED_MANUAL_REVIEW]
      entry_allowed: {type: boolean}
      close_only: {type: boolean}
      kill_switch: {type: boolean}
      cancel_pending_entries: {type: boolean}
      safe_exit_allowed: {const: true}
      manual_review_required: {type: boolean}
      reason_codes:
        type: array
        minItems: 1
        uniqueItems: true
        items:
          enum:
            - risk_checks_passed
            - daily_loss_limit_reached
            - weekly_loss_limit_reached
            - drawdown_limit_reached
            - absolute_loss_limit_reached
            - external_cash_flow_pending_review
            - unexplained_balance_difference
            - accounting_currency_mismatch
            - unknown_liability
            - unreconciled_order_or_position
            - manual_kill_switch
            - account_source_incomplete
            - market_source_incomplete
            - mark_price_missing
            - mark_price_stale
            - open_orders_source_incomplete
            - open_orders_stale
            - source_clock_skew
    allOf:
      - if:
          properties: {state: {const: ENTRY_ALLOWED}}
          required: [state]
        then:
          properties:
            entry_allowed: {const: true}
            close_only: {const: false}
            kill_switch: {const: false}
            cancel_pending_entries: {const: false}
            manual_review_required: {const: false}
            reason_codes: {const: [risk_checks_passed]}
      - if:
          properties: {state: {const: CLOSE_ONLY}}
          required: [state]
        then:
          properties:
            entry_allowed: {const: false}
            close_only: {const: true}
            kill_switch: {const: false}
            cancel_pending_entries: {const: true}
      - if:
          properties: {state: {const: KILLED_MANUAL_REVIEW}}
          required: [state]
        then:
          properties:
            entry_allowed: {const: false}
            close_only: {const: true}
            kill_switch: {const: true}
            cancel_pending_entries: {const: true}
            manual_review_required: {const: true}
allOf:
  - if:
      properties:
        decision:
          properties: {state: {const: ENTRY_ALLOWED}}
          required: [state]
      required: [decision]
    then:
      properties:
        source_freshness:
          properties:
            account_complete: {const: true}
            market_complete: {const: true}
            orders_complete: {const: true}
$defs:
  utc_timestamp:
    type: string
    format: date-time
    pattern: 'Z$'
  sha256:
    type: string
    pattern: '^[a-f0-9]{64}$'
  signed_decimal:
    type: string
    pattern: '^-?(?:0|[1-9][0-9]*)(?:\.[0-9]+)?$'
  nonnegative_decimal:
    type: string
    pattern: '^(?:0|[1-9][0-9]*)(?:\.[0-9]+)?$'
  positive_decimal:
    type: string
    pattern: '^(?:0\.0*[1-9][0-9]*|[1-9][0-9]*(?:\.[0-9]+)?)$'
  fraction:
    type: string
    pattern: '^(?:0(?:\.[0-9]+)?|1(?:\.0+)?)$'
  spot_position:
    type: object
    additionalProperties: false
    required:
      - instrument_id
      - market
      - pair
      - side
      - quantity
      - best_bid
      - last_trade
      - conservative_exit_mark
      - marked_value
    properties:
      instrument_id: {type: string, pattern: '^[A-Z][A-Z0-9]{1,15}$'}
      market: {const: spot}
      pair: {type: string, pattern: '^[A-Z][A-Z0-9]{1,15}/USDT$'}
      side: {const: long}
      quantity: {$ref: '#/$defs/positive_decimal'}
      best_bid: {$ref: '#/$defs/positive_decimal'}
      last_trade: {$ref: '#/$defs/positive_decimal'}
      conservative_exit_mark: {$ref: '#/$defs/positive_decimal'}
      marked_value: {$ref: '#/$defs/nonnegative_decimal'}
  futures_position:
    type: object
    additionalProperties: false
    required:
      - instrument_id
      - market
      - pair
      - side
      - quantity
      - entry_price
      - mark_price
      - liquidation_price
      - leverage
      - notional_quote
      - position_margin_quote
      - maintenance_margin_quote
      - unrealized_pnl_quote
      - funding_rate
      - accrued_funding_quote
      - next_funding_at_utc
      - liquidation_buffer_fraction
    properties:
      instrument_id: {type: string, pattern: '^[A-Z][A-Z0-9]{1,15}$'}
      market: {const: linear_perpetual}
      pair: {type: string, pattern: '^[A-Z][A-Z0-9]{1,15}/USDT:USDT$'}
      side: {enum: [long, short]}
      quantity: {$ref: '#/$defs/positive_decimal'}
      entry_price: {$ref: '#/$defs/positive_decimal'}
      mark_price: {$ref: '#/$defs/positive_decimal'}
      liquidation_price: {$ref: '#/$defs/positive_decimal'}
      leverage: {$ref: '#/$defs/positive_decimal'}
      notional_quote: {$ref: '#/$defs/positive_decimal'}
      position_margin_quote: {$ref: '#/$defs/positive_decimal'}
      maintenance_margin_quote: {$ref: '#/$defs/nonnegative_decimal'}
      unrealized_pnl_quote: {$ref: '#/$defs/signed_decimal'}
      funding_rate: {$ref: '#/$defs/signed_decimal'}
      accrued_funding_quote: {$ref: '#/$defs/signed_decimal'}
      next_funding_at_utc: {$ref: '#/$defs/utc_timestamp'}
      liquidation_buffer_fraction: {$ref: '#/$defs/positive_decimal'}
  open_order:
    type: object
    additionalProperties: false
    required:
      - order_id
      - instrument_id
      - market
      - pair
      - side
      - position_side
      - intent
      - order_type
      - quantity
      - filled_quantity
      - remaining_quantity
      - reference_price
      - trigger_price
      - remaining_notional_quote
      - reduce_only
      - created_at_utc
      - updated_at_utc
    properties:
      order_id: {type: string, minLength: 1, maxLength: 128}
      instrument_id: {type: string, pattern: '^[A-Z][A-Z0-9]{1,15}$'}
      market: {enum: [spot, linear_perpetual]}
      pair:
        type: string
        pattern: '^[A-Z][A-Z0-9]{1,15}/USDT(?::USDT)?$'
      side: {enum: [buy, sell]}
      position_side: {enum: [long, short]}
      intent: {enum: [entry, reduce, stop_loss, take_profit]}
      order_type: {enum: [limit, market, stop_limit, stop_market]}
      quantity: {$ref: '#/$defs/positive_decimal'}
      filled_quantity: {$ref: '#/$defs/nonnegative_decimal'}
      remaining_quantity: {$ref: '#/$defs/positive_decimal'}
      reference_price: {$ref: '#/$defs/positive_decimal'}
      trigger_price:
        anyOf:
          - {$ref: '#/$defs/positive_decimal'}
          - {type: 'null'}
      remaining_notional_quote: {$ref: '#/$defs/positive_decimal'}
      reduce_only: {type: boolean}
      created_at_utc: {$ref: '#/$defs/utc_timestamp'}
      updated_at_utc: {$ref: '#/$defs/utc_timestamp'}

$comment: >-
  实现额外校验 Registry/Capability hash、时间和 TTL、position/order 唯一性、
  spot mark、futures PnL/notional/liquidation buffer、order remaining、NAV/PnL/HWM、
  分市场敞口、pending exposure、used margin、阈值命中与 snapshot_id 内容 hash。
