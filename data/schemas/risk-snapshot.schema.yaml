$schema: https://json-schema.org/draft/2020-12/schema
$id: https://alphamind.local/schemas/risk-snapshot.schema.yaml
title: alphaMind RiskSnapshot v1
description: >-
  Freqtrade MVP 消费的只读账户级风险快照。所有金额和比例均使用十进制字符串，
  避免二进制浮点在风险边界附近改变判定。
type: object
additionalProperties: false
required:
  - schema_version
  - snapshot_id
  - producer_version
  - generated_at_utc
  - expires_at_utc
  - account_id
  - accounting_currency
  - risk_config_sha256
  - source_freshness
  - accounting
  - exposure
  - thresholds
  - decision
properties:
  schema_version:
    const: 1
  snapshot_id:
    type: string
    pattern: "^risk-[0-9]{8}T[0-9]{6}Z-[a-f0-9]{12}$"
  producer_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?$"
  generated_at_utc:
    $ref: "#/$defs/utc_timestamp"
  expires_at_utc:
    $ref: "#/$defs/utc_timestamp"
    $comment: 实现必须验证 expires_at_utc 等于 generated_at_utc 加 60 秒。
  account_id:
    type: string
    minLength: 1
    maxLength: 128
  accounting_currency:
    const: USDT
  risk_config_sha256:
    $ref: "#/$defs/sha256"
  source_freshness:
    type: object
    additionalProperties: false
    required:
      - account_observed_at_utc
      - market_observed_at_utc
      - maximum_source_age_seconds
      - maximum_future_clock_skew_seconds
      - account_complete
      - market_complete
    properties:
      account_observed_at_utc:
        $ref: "#/$defs/utc_timestamp"
      market_observed_at_utc:
        $ref: "#/$defs/utc_timestamp"
      maximum_source_age_seconds:
        const: 30
      maximum_future_clock_skew_seconds:
        const: 5
      account_complete:
        type: boolean
      market_complete:
        type: boolean
  accounting:
    type: object
    additionalProperties: false
    required:
      - quote_cash
      - positions
      - accrued_fees
      - known_liabilities
      - nav
      - approved_capital_baseline
      - cumulative_net_external_cash_flow
      - cashflow_adjusted_cumulative_pnl
      - daily_opening_nav
      - daily_net_external_cash_flow
      - daily_pnl
      - weekly_opening_nav
      - weekly_net_external_cash_flow
      - weekly_pnl
      - cashflow_adjusted_high_water_mark
      - drawdown_fraction
      - unexplained_balance_difference
    properties:
      quote_cash:
        $ref: "#/$defs/nonnegative_decimal"
      positions:
        type: array
        maxItems: 2
        uniqueItems: true
        items:
          $ref: "#/$defs/position"
      accrued_fees:
        $ref: "#/$defs/nonnegative_decimal"
      known_liabilities:
        $ref: "#/$defs/nonnegative_decimal"
      nav:
        $ref: "#/$defs/positive_decimal"
      approved_capital_baseline:
        $ref: "#/$defs/positive_decimal"
      cumulative_net_external_cash_flow:
        $ref: "#/$defs/signed_decimal"
      cashflow_adjusted_cumulative_pnl:
        $ref: "#/$defs/signed_decimal"
      daily_opening_nav:
        $ref: "#/$defs/positive_decimal"
      daily_net_external_cash_flow:
        $ref: "#/$defs/signed_decimal"
      daily_pnl:
        $ref: "#/$defs/signed_decimal"
      weekly_opening_nav:
        $ref: "#/$defs/positive_decimal"
      weekly_net_external_cash_flow:
        $ref: "#/$defs/signed_decimal"
      weekly_pnl:
        $ref: "#/$defs/signed_decimal"
      cashflow_adjusted_high_water_mark:
        $ref: "#/$defs/positive_decimal"
      drawdown_fraction:
        $ref: "#/$defs/fraction"
      unexplained_balance_difference:
        $ref: "#/$defs/signed_decimal"
  exposure:
    type: object
    additionalProperties: false
    required:
      - open_exposure_quote
      - pending_entry_exposure_quote
      - available_balance_quote
    properties:
      open_exposure_quote:
        $ref: "#/$defs/nonnegative_decimal"
      pending_entry_exposure_quote:
        $ref: "#/$defs/nonnegative_decimal"
      available_balance_quote:
        $ref: "#/$defs/nonnegative_decimal"
  thresholds:
    type: object
    additionalProperties: false
    required:
      - trade_risk_fraction
      - daily_loss_fraction
      - weekly_loss_fraction
      - drawdown_fraction
      - maximum_absolute_loss_fraction
      - maximum_absolute_loss
      - effective_absolute_loss_limit
    properties:
      trade_risk_fraction:
        const: "0.0025"
      daily_loss_fraction:
        const: "0.01"
      weekly_loss_fraction:
        const: "0.03"
      drawdown_fraction:
        const: "0.05"
      maximum_absolute_loss_fraction:
        const: "0.10"
      maximum_absolute_loss:
        const: "45"
      effective_absolute_loss_limit:
        $ref: "#/$defs/positive_decimal"
  decision:
    type: object
    additionalProperties: false
    required:
      - state
      - entry_allowed
      - close_only
      - kill_switch
      - cancel_pending_entries
      - safe_exit_allowed
      - manual_review_required
      - reason_codes
    properties:
      state:
        enum:
          - ENTRY_ALLOWED
          - CLOSE_ONLY
          - KILLED_MANUAL_REVIEW
      entry_allowed:
        type: boolean
      close_only:
        type: boolean
      kill_switch:
        type: boolean
      cancel_pending_entries:
        type: boolean
      safe_exit_allowed:
        const: true
      manual_review_required:
        type: boolean
      reason_codes:
        type: array
        uniqueItems: true
        items:
          enum:
            - risk_checks_passed
            - daily_loss_limit_reached
            - weekly_loss_limit_reached
            - drawdown_limit_reached
            - absolute_loss_limit_reached
            - external_cash_flow_pending_review
            - unexplained_balance_difference
            - accounting_currency_mismatch
            - unknown_liability
            - unreconciled_order_or_position
            - account_source_incomplete
            - market_source_incomplete
            - mark_price_missing
            - mark_price_stale
            - source_clock_skew
    allOf:
      - if:
          properties:
            state:
              const: ENTRY_ALLOWED
          required: [state]
        then:
          properties:
            entry_allowed: {const: true}
            close_only: {const: false}
            kill_switch: {const: false}
            cancel_pending_entries: {const: false}
            manual_review_required: {const: false}
            reason_codes:
              const: [risk_checks_passed]
      - if:
          properties:
            state:
              const: CLOSE_ONLY
          required: [state]
        then:
          properties:
            entry_allowed: {const: false}
            close_only: {const: true}
            kill_switch: {const: false}
            cancel_pending_entries: {const: true}
            reason_codes:
              minItems: 1
            manual_review_required:
              type: boolean
          allOf:
            - properties:
                reason_codes:
                  items:
                    enum:
                      - daily_loss_limit_reached
                      - weekly_loss_limit_reached
                      - external_cash_flow_pending_review
                      - account_source_incomplete
                      - market_source_incomplete
                      - mark_price_missing
                      - mark_price_stale
                      - source_clock_skew
            - if:
                properties:
                  reason_codes:
                    contains:
                      enum:
                        - weekly_loss_limit_reached
                        - external_cash_flow_pending_review
              then:
                properties:
                  manual_review_required: {const: true}
      - if:
          properties:
            state:
              const: KILLED_MANUAL_REVIEW
          required: [state]
        then:
          properties:
            entry_allowed: {const: false}
            close_only: {const: true}
            kill_switch: {const: true}
            cancel_pending_entries: {const: true}
            manual_review_required: {const: true}
            reason_codes:
              minItems: 1
              contains:
                enum:
                  - drawdown_limit_reached
                  - absolute_loss_limit_reached
                  - unexplained_balance_difference
                  - accounting_currency_mismatch
                  - unknown_liability
                  - unreconciled_order_or_position
allOf:
  - if:
      properties:
        decision:
          properties:
            state:
              const: ENTRY_ALLOWED
          required: [state]
      required: [decision]
    then:
      properties:
        source_freshness:
          properties:
            account_complete: {const: true}
            market_complete: {const: true}
        accounting:
          properties:
            unexplained_balance_difference:
              pattern: "^0(?:\\.0+)?$"
$defs:
  utc_timestamp:
    type: string
    format: date-time
    pattern: "Z$"
  sha256:
    type: string
    pattern: "^[a-f0-9]{64}$"
  signed_decimal:
    type: string
    pattern: "^-?(?:0|[1-9][0-9]*)(?:\\.[0-9]+)?$"
  nonnegative_decimal:
    type: string
    pattern: "^(?:0|[1-9][0-9]*)(?:\\.[0-9]+)?$"
  positive_decimal:
    type: string
    pattern: "^(?:0\\.0*[1-9][0-9]*|[1-9][0-9]*(?:\\.[0-9]+)?)$"
  fraction:
    type: string
    pattern: "^(?:0(?:\\.[0-9]+)?|1(?:\\.0+)?)$"
  position:
    type: object
    additionalProperties: false
    required:
      - pair
      - base_quantity
      - best_bid
      - last_trade
      - conservative_exit_mark
      - marked_value
    properties:
      pair:
        enum:
          - BTC/USDT
          - ETH/USDT
      base_quantity:
        $ref: "#/$defs/nonnegative_decimal"
      best_bid:
        $ref: "#/$defs/positive_decimal"
      last_trade:
        $ref: "#/$defs/positive_decimal"
      conservative_exit_mark:
        $ref: "#/$defs/positive_decimal"
        $comment: 实现必须验证该值等于 min(best_bid, last_trade)。
      marked_value:
        $ref: "#/$defs/nonnegative_decimal"
        $comment: 实现必须用精确十进制验证 base_quantity 乘 conservative_exit_mark。

$comment: >-
  JSON Schema 之外的实现校验：时间字段关系、source age、NAV/PnL/HWM 公式、position
  算术、effective absolute loss limit、阈值命中与 reason code、跨 position pair 唯一性。
