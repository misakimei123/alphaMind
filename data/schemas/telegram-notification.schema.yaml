$schema: https://json-schema.org/draft/2020-12/schema
$id: https://alphamind.local/schemas/telegram-notification.schema.yaml
title: alphaMind TelegramNotification v1
description: Sanitized execution or risk fact queued for Telegram delivery.
type: object
additionalProperties: false
required:
  - schema_version
  - notification_id
  - source_event_id
  - kind
  - severity
  - occurred_at_utc
  - proposal_id
  - execution_id
  - instrument_id
  - market
  - action
  - requested_quantity
  - filled_quantity
  - average_fill_price
  - order_ids
  - risk_state
  - reason_codes
properties:
  schema_version: {const: 1}
  notification_id:
    type: string
    pattern: "^notification-[a-f0-9]{32}$"
  source_event_id:
    type: string
    pattern: "^[A-Za-z0-9][A-Za-z0-9_.:-]{7,127}$"
  kind:
    enum:
      - EXECUTION_SUCCEEDED
      - EXECUTION_PARTIALLY_FILLED
      - EXECUTION_NOT_EXECUTED
      - EXECUTION_FAILED
      - RISK_ALERT
  severity: {enum: [INFO, WARNING, CRITICAL]}
  occurred_at_utc: {$ref: "#/$defs/utc_timestamp"}
  proposal_id:
    anyOf:
      - type: string
        pattern: "^proposal-[0-9]{8}T[0-9]{6}Z-[a-f0-9]{12}$"
      - type: "null"
  execution_id:
    anyOf:
      - type: string
        pattern: "^exec-[0-9]{8}T[0-9]{6}Z-[a-f0-9]{12}$"
      - type: "null"
  instrument_id:
    anyOf:
      - {$ref: "#/$defs/safe_token"}
      - {type: "null"}
  market:
    anyOf:
      - {enum: [spot, linear_perpetual]}
      - {type: "null"}
  action:
    anyOf:
      - {enum: [OPEN, ADD, REDUCE, CLOSE, CANCEL_ORDER, REPLACE_PROTECTION]}
      - {type: "null"}
  requested_quantity: {$ref: "#/$defs/nullable_decimal"}
  filled_quantity: {$ref: "#/$defs/nullable_decimal"}
  average_fill_price: {$ref: "#/$defs/nullable_decimal"}
  order_ids:
    type: array
    maxItems: 20
    uniqueItems: true
    items: {$ref: "#/$defs/safe_token"}
  risk_state:
    anyOf:
      - {$ref: "#/$defs/reason_code"}
      - {type: "null"}
  reason_codes:
    type: array
    minItems: 1
    maxItems: 16
    uniqueItems: true
    items: {$ref: "#/$defs/reason_code"}
allOf:
  - if:
      properties: {kind: {const: RISK_ALERT}}
      required: [kind]
    then:
      properties:
        severity: {const: CRITICAL}
        proposal_id: {type: "null"}
        execution_id: {type: "null"}
        instrument_id: {type: "null"}
        market: {type: "null"}
        action: {type: "null"}
        requested_quantity: {type: "null"}
        filled_quantity: {type: "null"}
        average_fill_price: {type: "null"}
        risk_state: {$ref: "#/$defs/reason_code"}
    else:
      properties:
        proposal_id:
          type: string
          pattern: "^proposal-[0-9]{8}T[0-9]{6}Z-[a-f0-9]{12}$"
        execution_id:
          type: string
          pattern: "^exec-[0-9]{8}T[0-9]{6}Z-[a-f0-9]{12}$"
        instrument_id: {$ref: "#/$defs/safe_token"}
        market: {enum: [spot, linear_perpetual]}
        action: {enum: [OPEN, ADD, REDUCE, CLOSE, CANCEL_ORDER, REPLACE_PROTECTION]}
        risk_state: {type: "null"}
  - if:
      properties: {kind: {const: EXECUTION_SUCCEEDED}}
      required: [kind]
    then:
      properties:
        severity: {const: INFO}
        filled_quantity: {$ref: "#/$defs/positive_decimal"}
        average_fill_price: {$ref: "#/$defs/positive_decimal"}
  - if:
      properties: {kind: {const: EXECUTION_PARTIALLY_FILLED}}
      required: [kind]
    then:
      properties:
        severity: {const: WARNING}
        requested_quantity: {$ref: "#/$defs/positive_decimal"}
        filled_quantity: {$ref: "#/$defs/positive_decimal"}
        average_fill_price: {$ref: "#/$defs/positive_decimal"}
  - if:
      properties: {kind: {const: EXECUTION_NOT_EXECUTED}}
      required: [kind]
    then:
      properties:
        severity: {const: WARNING}
        filled_quantity:
          anyOf:
            - {const: "0"}
            - {type: "null"}
        average_fill_price: {type: "null"}
  - if:
      properties: {kind: {const: EXECUTION_FAILED}}
      required: [kind]
    then:
      properties: {severity: {const: CRITICAL}}
$defs:
  utc_timestamp:
    type: string
    format: date-time
    pattern: "Z$"
  safe_token:
    type: string
    pattern: "^[A-Za-z0-9][A-Za-z0-9_.:/-]{0,127}$"
  reason_code:
    type: string
    pattern: "^[A-Z][A-Z0-9_]{1,63}$"
  positive_decimal:
    type: string
    pattern: "^(?:0\\.0*[1-9][0-9]*|[1-9][0-9]*(?:\\.[0-9]+)?)$"
  nonnegative_decimal:
    type: string
    pattern: "^(?:0|0\\.[0-9]+|[1-9][0-9]*(?:\\.[0-9]+)?)$"
  nullable_decimal:
    anyOf:
      - {$ref: "#/$defs/nonnegative_decimal"}
      - {type: "null"}
$comment: >-
  Runtime validation additionally enforces quantity ordering. Facts contain stable codes only;
  raw provider responses, exception text, credentials and Telegram identities are forbidden.
