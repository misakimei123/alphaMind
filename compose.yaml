name: alphamind

x-freqtrade-base: &freqtrade-base
  image: freqtradeorg/freqtrade@sha256:1e9298ae0895531fd47c4f13d10e5708b3b8b6e5241292f364fc23f201b5acaa
  platform: linux/amd64
  init: true
  restart: "no"
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp
  volumes:
    - ./configs/freqtrade:/freqtrade/configs:ro
    - ./user_data:/freqtrade/user_data

services:
  runtime-check:
    <<: *freqtrade-base
    profiles: [tools]
    entrypoint: [python]
    command:
      - /workspace/scripts/verify_runtime_lock.py
      - --config
      - /workspace/configs/common/runtime-versions.toml
      - --target
      - freqtrade
    network_mode: none
    volumes:
      - ./:/workspace:ro

  contract-check:
    <<: *freqtrade-base
    profiles: [tools]
    entrypoint: [python]
    command:
      - /workspace/scripts/verify_freqtrade_contract.py
    network_mode: none
    volumes:
      - ./:/workspace:ro

  freqtrade-cli:
    <<: *freqtrade-base
    profiles: [tools]
    command: [--version]
    network_mode: none

  backtest:
    <<: *freqtrade-base
    profiles: [backtest]
    command:
      - backtesting
      - --config
      - /freqtrade/configs/backtest.json

  dry-run:
    <<: *freqtrade-base
    profiles: [dry-run]
    command:
      - trade
      - --config
      - /freqtrade/configs/dry-run.json

  replay:
    <<: *freqtrade-base
    profiles: [replay]
    command:
      - show-config
      - --config
      - /freqtrade/configs/replay.json
    network_mode: none

  data-snapshot:
    <<: *freqtrade-base
    profiles: [data]
    entrypoint: [python]
    command:
      - /workspace/scripts/create_source_snapshot.py
      - --project-root
      - /workspace
    working_dir: /workspace
    volumes:
      - ./:/workspace:ro
      - ./data:/workspace/data

  data-quality:
    <<: *freqtrade-base
    profiles: [data]
    entrypoint: [python]
    # 脚本入口同时依赖 src package 与 scripts package，容器必须显式加载两个目录。
    environment:
      PYTHONPATH: /workspace/src:/workspace
    command:
      - /workspace/scripts/build_clean_dataset.py
      - --project-root
      - /workspace
      - --source-manifest
      - /workspace/data/manifests/source/bybit-spot-ohlcv-20260716T070451Z-ef232b839406.manifest.json
    working_dir: /workspace
    network_mode: none
    volumes:
      - ./:/workspace:ro
      - ./data:/workspace/data

  benchmark-report:
    <<: *freqtrade-base
    profiles: [research]
    entrypoint: [python]
    # P1-05 复用锁定镜像中的 pandas/pyarrow，只读 clean 数据并写入版本化研究报告。
    environment:
      PYTHONPATH: /workspace/src:/workspace
    command:
      - /workspace/scripts/build_benchmark_report.py
      - --project-root
      - /workspace
      - --quality-report
      - /workspace/data/manifests/quality/bybit-spot-development-ef232b839406-p1-04-v1/report.json
    working_dir: /workspace
    network_mode: none
    volumes:
      - ./:/workspace:ro
      - ./data:/workspace/data:ro
      - ./research:/workspace/research

# live.template.json 故意不映射为 Compose service；P5 批准前不能通过本文件启动 Live。
