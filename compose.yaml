name: alphamind

x-freqtrade-base: &freqtrade-base
  image: freqtradeorg/freqtrade@sha256:1e9298ae0895531fd47c4f13d10e5708b3b8b6e5241292f364fc23f201b5acaa
  platform: linux/amd64
  init: true
  restart: "no"
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp
  environment:
    PYTHONPATH: /freqtrade/src
    # 实际部署 commit 缺失时 strategy bot_start fail-closed；不在镜像或仓库中伪造 provenance。
    ALPHAMIND_PROJECT_COMMIT: ${ALPHAMIND_PROJECT_COMMIT:-}
  volumes:
    - ./configs/freqtrade:/freqtrade/configs:ro
    - ./configs/common:/freqtrade/common:ro
    - ./src:/freqtrade/src:ro
    - ./user_data:/freqtrade/user_data

services:
  runtime-check:
    <<: *freqtrade-base
    profiles: [tools]
    entrypoint: [python]
    command:
      - /workspace/scripts/verify_runtime_lock.py
      - --config
      - /workspace/configs/common/runtime-versions.toml
      - --target
      - freqtrade
    network_mode: none
    volumes:
      - ./:/workspace:ro

  contract-check:
    <<: *freqtrade-base
    profiles: [tools]
    entrypoint: [python]
    command:
      - /workspace/scripts/verify_freqtrade_contract.py
    network_mode: none
    volumes:
      - ./:/workspace:ro

  audit-writer:
    <<: *freqtrade-base
    profiles: [audit]
    entrypoint: [python]
    command:
      - /workspace/scripts/run_audit_writer.py
      - --config
      - /freqtrade/common/audit-outbox.toml
    working_dir: /workspace
    network_mode: none
    # sidecar 只读取 source/config/outbox，并写独立 Audit DB；不挂载 Runtime DB 或凭据。
    volumes:
      - ./:/workspace:ro
      - ./configs/common:/freqtrade/common:ro
      - ./src:/freqtrade/src:ro
      - ./user_data/audit:/freqtrade/user_data/audit

  freqtrade-cli:
    <<: *freqtrade-base
    profiles: [tools]
    command: [--version]
    network_mode: none

  backtest:
    <<: *freqtrade-base
    profiles: [backtest]
    command:
      - backtesting
      - --config
      - /freqtrade/configs/backtest.json

  dry-run:
    <<: *freqtrade-base
    profiles: [dry-run]
    command:
      - trade
      - --config
      - /freqtrade/configs/dry-run.json

  replay:
    <<: *freqtrade-base
    profiles: [replay]
    command:
      - show-config
      - --config
      - /freqtrade/configs/replay.json
    network_mode: none

  data-snapshot:
    <<: *freqtrade-base
    profiles: [data]
    entrypoint: [python]
    command:
      - /workspace/scripts/create_source_snapshot.py
      - --project-root
      - /workspace
    working_dir: /workspace
    volumes:
      - ./:/workspace:ro
      - ./data:/workspace/data

  data-quality:
    <<: *freqtrade-base
    profiles: [data]
    entrypoint: [python]
    # 脚本入口同时依赖 src package 与 scripts package，容器必须显式加载两个目录。
    environment:
      PYTHONPATH: /workspace/src:/workspace
    command:
      - /workspace/scripts/build_clean_dataset.py
      - --project-root
      - /workspace
      - --source-manifest
      - /workspace/data/manifests/source/bybit-spot-ohlcv-20260716T070451Z-ef232b839406.manifest.json
    working_dir: /workspace
    network_mode: none
    volumes:
      - ./:/workspace:ro
      - ./data:/workspace/data

  benchmark-report:
    <<: *freqtrade-base
    profiles: [research]
    entrypoint: [python]
    # P1-05 复用锁定镜像中的 pandas/pyarrow，只读 clean 数据并写入版本化研究报告。
    environment:
      PYTHONPATH: /workspace/src:/workspace
    command:
      - /workspace/scripts/build_benchmark_report.py
      - --project-root
      - /workspace
      - --quality-report
      - /workspace/data/manifests/quality/bybit-spot-development-ef232b839406-p1-04-v1/report.json
    working_dir: /workspace
    network_mode: none
    volumes:
      - ./:/workspace:ro
      - ./data:/workspace/data:ro
      - ./research:/workspace/research

  walk-forward-report:
    <<: *freqtrade-base
    profiles: [research]
    entrypoint: [python]
    # P2-05 先写入全部预注册，再读取 clean 数据并追加结果；容器无网络且不挂载交易凭据。
    environment:
      PYTHONPATH: /workspace/src:/workspace
    command:
      - /workspace/scripts/build_walk_forward_report.py
      - --project-root
      - /workspace
      - --build
    working_dir: /workspace
    network_mode: none
    volumes:
      - ./:/workspace:ro
      - ./data:/workspace/data:ro
      - ./research:/workspace/research

  anti-cheat-report:
    <<: *freqtrade-base
    profiles: [research]
    entrypoint: [python]
    # P2-06 build 仅联网读取公开市场 metadata/OKX candle；不挂载密钥、DB 或 Live 配置。
    environment:
      PYTHONPATH: /workspace/src:/workspace
    command:
      - /workspace/scripts/build_anti_cheat_report.py
      - --project-root
      - /workspace
      - --build
    working_dir: /workspace
    volumes:
      - ./:/workspace:ro
      - ./data:/workspace/data
      - ./research:/workspace/research

  anti-cheat-verify:
    <<: *freqtrade-base
    profiles: [research]
    entrypoint: [python]
    # 已发布证据必须可在无网络、全只读挂载中复核。
    environment:
      PYTHONPATH: /workspace/src:/workspace
    command:
      - /workspace/scripts/build_anti_cheat_report.py
      - --project-root
      - /workspace
      - --verify
    working_dir: /workspace
    network_mode: none
    volumes:
      - ./:/workspace:ro

# live.template.json 故意不映射为 Compose service；P5 批准前不能通过本文件启动 Live。
