schema_version = 1
snapshot_path = "/freqtrade/user_data/risk/risk-snapshot.json"

[strategy]
# P0-04 已冻结的 ATR(20) x 2 初始硬止损；最大持仓时间保持禁用。
atr_period = 20
stop_multiple = "2.0"
maximum_holding_time_enabled = false

[risk]
# 与 P2-03/P2-05 同源；运行时不得用 Freqtrade proposed stake 扩大这些上限。
volatility_cap_fraction = "0.40"
symbol_exposure_fraction = "0.40"
directional_exposure_fraction = "0.70"
maximum_unit_loss_fraction = "0.50"
gap_buffer_rate = "0.002"

[costs]
# 与 P2-04/P2-05 的非压力基础场景一致，Live 前仍须按账户实际费率复核。
fee_rate_per_side = "0.001"
half_spread_rate = "0.00025"
slippage_rate_per_side = "0.0005"

[pairs."BTC/USDT"]
price_tick = "0.1"
quantity_step = "0.000001"
minimum_quantity = "0.000001"
minimum_notional = "5"

[pairs."ETH/USDT"]
price_tick = "0.01"
quantity_step = "0.00001"
minimum_quantity = "0.00001"
minimum_notional = "5"
