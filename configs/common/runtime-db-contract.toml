schema_version = 1
freqtrade_version = "2026.6"
schema_manifest_path = "configs/common/freqtrade-runtime-schema-2026.6.json"
migration_owner = "freqtrade"
rpo_seconds = 300
rto_seconds = 60
recovery_order = [
  "exchange_facts",
  "runtime_db",
  "freqtrade_reconcile",
  "safe_disposition",
  "audit_backfill",
]

[environments.backtest]
backend = "sqlite"
db_url = "sqlite:////freqtrade/user_data/db/backtest.sqlite"
identity = "backtest"

[environments.spot_dry_run]
backend = "sqlite"
db_url = "sqlite:////freqtrade/user_data/db/spot.dry-run.sqlite"
identity = "spot-dry-run"

[environments.futures_dry_run]
backend = "sqlite"
db_url = "sqlite:////freqtrade/user_data/db/futures.dry-run.sqlite"
identity = "futures-dry-run"

[environments.replay]
backend = "sqlite"
db_url = "sqlite:////freqtrade/user_data/db/replay.sqlite"
identity = "replay"

[environments.testnet_contract]
backend = "sqlite"
db_url = "sqlite:////freqtrade/user_data/db/contract.sqlite"
identity = "testnet-contract"

[environments.spot_live_canary]
backend = "postgresql"
db_url_env = "ALPHAMIND_SPOT_FREQTRADE_DB_URL"
database = "alphamind_spot_live"
schema = "freqtrade_spot_live"
owner_role = "freqtrade_spot_live_owner"
watchdog_role = "freqtrade_spot_live_watchdog"
identity = "spot-live-canary"

[environments.futures_live_canary]
backend = "postgresql"
db_url_env = "ALPHAMIND_FUTURES_FREQTRADE_DB_URL"
database = "alphamind_futures_live"
schema = "freqtrade_futures_live"
owner_role = "freqtrade_futures_live_owner"
watchdog_role = "freqtrade_futures_live_watchdog"
identity = "futures-live-canary"
