# R2-03 read-only compatibility profile. This profile never grants trading authority.
schema_version: 1
profile_id: deepseek_v4_flash_trade_decision_test_v2

provider:
  id: deepseek
  api: chat_completions
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY  # pragma: allowlist secret

model:
  id: deepseek-v4-flash
  thinking: disabled
  reasoning_effort: null
  verbosity: null
  temperature: 0
  seed: null

prompt:
  id: alphamind_trade_decision
  version: 2
  path: prompts/ai/trade-decision-v2.md
  sha256: 48f22b3df4e6dc6efaf013d3056d7a9d82109c8a83c7704bcb1603d416f3f390

structured_output:
  enabled: true
  strict: true
  provider_schema_enforced: false
  schema_name: alphamind_model_decision_v1
  schema_path: data/schemas/model-decision.schema.yaml
  runtime_action_schema_path: data/schemas/trade-action.schema.yaml

request:
  timeout_seconds: 90
  max_input_tokens: 24000
  max_output_tokens: 3000
  store_response: false
  tools_enabled: false
  background: false

retry:
  maximum_attempts: 2
  backoff_seconds: [2]
  retry_on: [timeout, rate_limit, server_error, malformed_structured_output]
  never_retry_on:
    - authentication_error
    - policy_refusal
    - business_validation_error
    - budget_exceeded

cost:
  currency: USD
  pricing_checked_at_utc: "2026-07-20T00:00:00Z"
  input_per_million_tokens: "0.14"
  cached_input_per_million_tokens: "0.0028"
  output_per_million_tokens: "0.28"
  maximum_cost_per_cycle: "0.01"
  maximum_cost_per_utc_day: "0.48"
  pricing_source: https://api-docs.deepseek.com/quick_start/pricing

failure_policy:
  timeout: HOLD_ONLY
  provider_error: HOLD_ONLY
  invalid_output: HOLD_ONLY
  budget_exceeded: HOLD_ONLY

audit:
  record_model_id: true
  record_prompt_sha256: true
  record_config_sha256: true
  record_input_sha256: true
  record_usage: true
  record_raw_prompt: false
  record_api_key: false
